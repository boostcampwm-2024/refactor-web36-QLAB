
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=shell_cache:10m inactive=30m max_size=500m;

map $request_method $purge_cache {
    default 0;
    POST 1;
    PUT 1;
    DELETE 1;
}

server {
    listen 80;
    server_name _;


    # 정적 파일 serve
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # 이미지와 css 파일 캐싱
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|mp4|webp|eot|otf|ttf)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /purge/ {
        # 쿠버네티스 내부 네트워크에서 캐시 무효화 허용
        allow 10.0.0.0/8; 
        deny all;
        proxy_cache_purge shell_cache $scheme$request_method$host$request_uri$cookie_sid;
    }
    
    location = /api/shells {
        proxy_cache shell_cache;
        proxy_pass http://apiserver-service:3000;

        proxy_cache_valid 200 30m;
        proxy_cache_valid 404 1m;
        proxy_cache_key "$scheme$request_method$host$request_uri$cookie_sid";

        proxy_cache_bypass $purge_cache;
        proxy_no_cache $purge_cache;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        add_header X-Cache $upstream_cache_status;
    }

    # 네스트 서비스 서버로 라우팅
    location /api/ {
        proxy_pass http://apiserver-service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

