http {
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=shell_cache:10m inactive=30m max_size=500m;

    server {
        listen 80;
        server_name _;


        # 정적 파일 serve
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location = /api/shells {
            proxy_cache shell_cache;
            proxy_pass http://apiserver-service:3000;

            proxy_cache_valid 200 30m;
            proxy_cache_valid 404 1m;
            proxy_cache_key "$scheme$request_method$host$request_uri$cookie_sid";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header X-Cache $upstream_cache_status;
        }

        # 네스트 서비스 서버로 라우팅
        location /api/ {
            proxy_pass http://apiserver-service:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
