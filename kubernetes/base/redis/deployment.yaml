apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: rate-limiter
        image: redis:7.4-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: rate-limiter-data
          mountPath: /data
        command:
        - "rate-limiter-server"
        - "--appendonly"
        - "yes"
      volumes:
      - name: rate-limiter-data
        persistentVolumeClaim:
          claimName: rate-limiter-pvc