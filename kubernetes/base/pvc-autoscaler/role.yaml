apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pvc-autoscaler
  namespace: default
rules:
  # PVC 확장 권한
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "patch"]

  # Pod 정보 조회 및 디스크 사용량 확인
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

  # Pod exec 권한 (디스크 사용량 확인)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
