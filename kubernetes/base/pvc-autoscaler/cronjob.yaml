apiVersion: batch/v1
kind: CronJob
metadata:
  name: pvc-autoscaler
  namespace: default
spec:
  schedule: "*/5 * * * *"  # 5분마다 실행
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pvc-autoscaler
          restartPolicy: OnFailure
          containers:
            - name: autoscaler
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - /scripts/autoscaler.sh
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: pvc-autoscaler-script
                defaultMode: 0755
