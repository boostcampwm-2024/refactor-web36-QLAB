apiVersion: v1
kind: ConfigMap
metadata:
  name: pvc-autoscaler-script
  namespace: default
data:
  autoscaler.sh: |
    #!/bin/bash
    set -euo pipefail

    # 설정
    EXPAND_THRESHOLD=80        # 확장 임계치 (%)
    EXPAND_PERCENT=20          # 확장 비율 (%)
    MIN_SIZE_GI=10             # 최소 볼륨 크기 (Gi)
    MAX_SIZE_GI=100            # 최대 볼륨 크기 (Gi)

    echo "========================================"
    echo "PVC AutoScaler Started at $(date)"
    echo "========================================"

    # PVC 현재 크기 가져오기 (Gi 단위)
    get_pvc_size() {
      local pvc_name=$1
      local size=$(kubectl get pvc "$pvc_name" -o jsonpath='{.spec.resources.requests.storage}')

      if [[ $size =~ ^([0-9]+)Gi$ ]]; then
        echo "${BASH_REMATCH[1]}"
      elif [[ $size =~ ^([0-9]+)G$ ]]; then
        echo "${BASH_REMATCH[1]}"
      else
        echo "0"
      fi
    }

    # 디스크 사용량 확인
    check_disk_usage() {
      local pod_name=$1
      local mount_path=$2
      local usage=$(kubectl exec "$pod_name" -- df "$mount_path" | tail -1 | awk '{print $5}' | sed 's/%//')
      echo "$usage"
    }

    # PVC 확장
    expand_pvc() {
      local pvc_name=$1
      local current_size=$2
      local new_size=$3

      echo "[EXPAND] $pvc_name: ${current_size}Gi -> ${new_size}Gi"
      kubectl patch pvc "$pvc_name" -p "{\"spec\":{\"resources\":{\"requests\":{\"storage\":\"${new_size}Gi\"}}}}"
      echo "[EXPAND] Successfully expanded $pvc_name"
    }

    # QueryDB Master PVC 처리
    echo "Checking QueryDB Master PVC..."

    master_pod=$(kubectl get pods -l app=querydb,role=master -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)

    if [ -z "$master_pod" ]; then
      echo "[WARNING] QueryDB Master pod not found, skipping"
      exit 0
    fi

    echo "Found master pod: $master_pod"

    # 디스크 사용량 확인
    usage=$(check_disk_usage "$master_pod" "/var/lib/mysql")
    echo "Disk usage: ${usage}%"

    # 현재 PVC 크기
    current_size=$(get_pvc_size "querydb-master-pvc")
    echo "Current PVC size: ${current_size}Gi"

    # 확장 체크 (80% 이상)
    if [ "$usage" -ge "$EXPAND_THRESHOLD" ]; then
      echo "[ACTION] Usage >= ${EXPAND_THRESHOLD}%, expanding..."

      new_size=$(( current_size + current_size * EXPAND_PERCENT / 100 ))

      if [ "$new_size" -gt "$MAX_SIZE_GI" ]; then
        echo "[WARNING] New size ${new_size}Gi exceeds max ${MAX_SIZE_GI}Gi, capping at max"
        new_size=$MAX_SIZE_GI
      fi

      if [ "$current_size" -lt "$MAX_SIZE_GI" ]; then
        expand_pvc "querydb-master-pvc" "$current_size" "$new_size"
      else
        echo "[WARNING] Already at max size, cannot expand"
      fi
    else
      echo "[INFO] Usage is normal (${usage}%), no action needed"
    fi

    echo "========================================"
    echo "PVC AutoScaler Completed at $(date)"
    echo "========================================"
