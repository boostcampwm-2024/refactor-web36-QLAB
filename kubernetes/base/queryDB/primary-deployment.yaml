apiVersion: apps/v1
kind: Deployment
metadata:
  name: querydb-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: querydb
      role: master
  template:
    metadata:
      labels:
        app: querydb
        role: master
    spec:
      containers:
        - name: querydb
          image: mysql:8.3
          ports:
            - containerPort: 3306
          command:
            - sh
            - -c
            - |
              # MySQL 시작
              docker-entrypoint.sh mysqld \
                --local-infile=1 \
                --server-id=1 \
                --log-bin=mysql-bin \
                --binlog-format=ROW \
                --gtid-mode=ON \
                --enforce-gtid-consistency=ON &

              MYSQL_PID=$!

              # MySQL 준비 대기
              echo "Waiting for MySQL to be ready..."
              until mysqladmin ping -h localhost --silent; do
                sleep 1
              done
              echo "MySQL is ready"

              # MySQL 프로세스 대기
              wait $MYSQL_PID
          volumeMounts:
            - name: querydb-data
              mountPath: /var/lib/mysql