apiVersion: v1
kind: Service
metadata:
  name: querydb-master
spec:
  selector:
    app: querydb
    role: master
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: querydb-replica
spec:
  selector:
    app: querydb
    role: replica
  ports:
    - port: 3306
      targetPort: 3306