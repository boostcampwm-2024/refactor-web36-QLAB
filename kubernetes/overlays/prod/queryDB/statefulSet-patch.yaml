apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: querydb
spec:
  template:
    spec:
      containers:
        - name: querydb
          envFrom:
            - configMapRef:
               name: qlab-config
            - secretRef:
               name: qlab-secret
      nodeSelector:
        ncloud.com/nks-nodepool: nodepool

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - querydb
              topologyKey: kubernetes.io/hostname