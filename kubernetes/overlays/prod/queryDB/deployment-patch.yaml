apiVersion: apps/v1
kind: Deployment
metadata:
  name: querydb-deployment
spec:
  replicas: 4
  template:
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - querydb
            topologyKey: kubernetes.io/hostname