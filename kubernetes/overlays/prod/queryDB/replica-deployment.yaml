apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: querydb-replica
spec:
  serviceName: querydb-replica
  selector:
    matchLabels:
      app: querydb
      role: replica
  template:
    metadata:
      labels:
        app: querydb
        role: replica
    spec:
      nodeSelector:
        ncloud.com/nks-nodepool: nodepool

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - querydb
              topologyKey: kubernetes.io/hostname

      initContainers:
        - name: wait-for-master
          image: mysql:8.3
          command:
            - sh
            - -c
            - |
              set -ex
              echo "Master 준비 대기 중..."
              until mysqladmin ping -h querydb-master --silent; do
                echo "Waiting for master..."
                sleep 2
              done
              echo "Master 준비 완료"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qlab-secret
                  key: root-password

      containers:
        - name: querydb
          image: mysql:8.3
          ports:
            - containerPort: 3306
          command:
            - sh
            - -c
            - |
              POD_IP=$(cat /etc/hosts | grep $(cat /etc/hostname) | awk '{print $1}')
              SERVER_ID=$(echo $POD_IP | sed 's/\.//g')
              echo "Starting MySQL with server-id: $SERVER_ID from IP: $POD_IP"

              # 초기 데이터 존재 여부 확인
              DATA_EXISTS=false
              if [ -f /var/lib/mysql/auto.cnf ]; then
                echo "Existing data found, skipping clone"
                DATA_EXISTS=true
              fi

              # MySQL 백그라운드 시작
              docker-entrypoint.sh mysqld \
                --server-id=$SERVER_ID \
                --read-only=1 \
                --skip-log-bin \
                --local-infile=1 \
                --gtid-mode=ON \
                --enforce-gtid-consistency=ON &

              MYSQL_PID=$!

              # MySQL 준비 대기
              echo "Waiting for MySQL to be ready..."
              until mysqladmin ping -h localhost --silent; do
                sleep 1
              done
              echo "MySQL is ready"

              # 초기 데이터가 없으면 Clone 실행
              if [ "$DATA_EXISTS" = false ]; then
                echo "Cloning data from master..."
                mysql -h localhost -uroot -p"$MYSQL_ROOT_PASSWORD" <<EOF
              INSTALL PLUGIN clone SONAME 'mysql_clone.so';
              SET GLOBAL clone_valid_donor_list = 'querydb-master:3306';
              CLONE INSTANCE FROM 'clone_user'@'querydb-master':3306
                IDENTIFIED BY '$MYSQL_ROOT_PASSWORD';
              EOF

                echo "Clone completed, restarting MySQL..."
                kill $MYSQL_PID
                wait $MYSQL_PID

                # MySQL 재시작
                docker-entrypoint.sh mysqld \
                  --server-id=$SERVER_ID \
                  --read-only=1 \
                  --skip-log-bin \
                  --local-infile=1 \
                  --gtid-mode=ON \
                  --enforce-gtid-consistency=ON &

                MYSQL_PID=$!

                # MySQL 준비 대기
                echo "Waiting for MySQL to be ready after clone..."
                until mysqladmin ping -h localhost --silent; do
                  sleep 1
                done
                echo "MySQL is ready after clone"
              fi

              # Replication 설정 (clone 후에는 자동으로 설정되지만 명시적으로 재확인)
              echo "Setting up replication..."
              mysql -h localhost -uroot -p"$MYSQL_ROOT_PASSWORD" <<EOF
              CHANGE REPLICATION SOURCE TO
                SOURCE_HOST='querydb-master',
                SOURCE_USER='root',
                SOURCE_PASSWORD='$MYSQL_ROOT_PASSWORD',
                SOURCE_AUTO_POSITION=1,
                GET_SOURCE_PUBLIC_KEY=1;
              START REPLICA;
              EOF

              echo "Replication started"

              # MySQL 프로세스 대기
              wait $MYSQL_PID
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qlab-secret
                  key: root-password
          envFrom:
            - configMapRef:
                name: qlab-config
            - secretRef:
                name: qlab-secret
          volumeMounts:
            - name: querydb-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mysqladmin ping -h localhost --silent && \
                  mysql -h localhost -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SHOW REPLICA STATUS\G" | grep "Replica_SQL_Running: Yes"
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 700m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi

  volumeClaimTemplates:
    - metadata:
        name: querydb-data
        labels:
          app: querydb
          role: replica
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
