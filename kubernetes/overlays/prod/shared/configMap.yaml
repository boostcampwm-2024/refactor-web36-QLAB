apiVersion: v1
kind: ConfigMap
metadata:
  name: qlab-config
data:
  DB_TYPE: "mysql"
  DB_HOST: "serverdb-service.default"
  DB_PORT: "3306"
  DB_USERNAME: "root"
  DB_DATABASE: "qlabdb"

  QUERY_DB_HOST: "querydb-master.default"
  QUERY_DB_REPLICA_HOST: "querydb-replica.default"
  QUERY_DB_TYPE: "mysql"
  QUERY_DB_PORT: "3306"
  QUERY_DB_USER: "root"

  MYSQL_DATABASE: "qlabdb"

  REDIS_HOST: "redis-service.default"
  REDIS_PORT: "6379"

  LOGGER_DIR: "/logs"