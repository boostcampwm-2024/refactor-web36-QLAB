apiVersion: apps/v1
kind: Deployment
metadata:
  name: querydb-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: querydb
  template:
    metadata:
      labels:
        app: querydb
    spec:
      containers:
      - name: querydb
        image: mysql:8.4
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpassword
        - name: MYSQL_DATABASE
          value: qlabdb
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: querydb-data
          mountPath: /var/lib/mysql
      volumes:
      - name: querydb-data
        emptyDir: {}